syntax = "proto3";

option csharp_namespace = "DistributedCommunicationBenchmark.Grpc";

package products;

service ProductService{
	rpc GetProductById(ProductRequest) returns (ProductReply);
	rpc GetProducts(ProductListRequest) returns (ProductListReply);
	rpc CreateProduct(CreateProductRequest) returns (ProductReply);
	rpc DownloadFile(FileRequest) returns (FileReply);
}

message ProductRequest {
	int32 product_id = 1;
}

message ProductListRequest {
	int32 pageNumber = 1;
	int32 pageSize = 2;
}

message CreateProductRequest{
	string name = 1;
	string description = 2;
	string material = 3;
	double price = 4;
}

message ProductReply {
	int32 product_id = 1;
	string name = 2;
	string description = 3;
	string material = 4;
	double price = 5;
	string ean = 6;
}

message ProductListReply {
	repeated ProductReply products = 1;
}

message FileRequest {
	int32 sizeMb = 1;
}

message FileReply {
	bytes data = 1;
}